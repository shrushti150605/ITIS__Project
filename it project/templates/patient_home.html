<!DOCTYPE html>
<html>
<head>
    <title>Patient Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">Welcome Patient</div>

<div class="container">

    <h2>Doctors Available</h2>
    <div class="card-container">
        {% if doctors %}
            {% for doctor in doctors %}
            <div class="card">
                <h3>{{ doctor[1] }}</h3>
                <p><strong>Specialization:</strong> {{ doctor[2] }}</p>
                <p><strong>Fees:</strong> ₹{{ doctor[3] }}</p>
                <a href="/book/{{ doctor[0] }}" class="btn book-btn">Book Appointment</a>
            </div>
            {% endfor %}
        {% else %}
            <p>No doctors available yet.</p>
        {% endif %}
    </div>

    <div class="buttons">
        <a href="/appointments" class="btn admin-btn">My Appointments</a>
        <a href="/logout" class="btn logout">Logout</a>
        <a href="/login" class="btn admin-btn">Admin Login</a>
    </div>

</div>

</body>
</html>
