<!DOCTYPE html>
<html>
<head>
    <title>All Doctors</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>All Doctors</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Specialization</th>
            <th>Fees</th>
        </tr>
        {% for doctor in doctors %}
        <tr>
            <td>{{ doctor[1] }}</td>
            <td>{{ doctor[2] }}</td>
            <td>₹{{ doctor[3] }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/dashboard">Back to Dashboard</a>
</div>

</body>
</html>
